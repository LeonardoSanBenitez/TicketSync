name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          pip install -e .
          pip install pytest mypy pycodestyle

      - name: Run mypy
        run: mypy ticket_sync/ --strict

      - name: Run pycodestyle
        run: pycodestyle --max-line-length=120 ticket_sync/

      - name: Run pytest
        run: pytest -v
